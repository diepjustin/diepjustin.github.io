<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Justin Diep</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">

    <style>
        :root {
            --bg-color: #fff;
            --text-color: #333;
            --heading-color: #111;
            --link-color: #0366d6;
            --border-color: #eee;
            --btn-bg: #111;
            --btn-text: #fff;
        }
        .dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --heading-color: #fff;
            --link-color: #58a6ff;
            --border-color: #333;
            --btn-bg: #eee;
            --btn-text: #111;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 4rem;
            color: var(--heading-color);
            margin: 0;
        }
        p {
            font-size: 1.2rem;
            max-width: 500px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .home-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background-color: var(--heading-color);
            color: var(--bg-color);
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }
        .home-btn:hover {
            opacity: 0.8;
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <h1>404</h1>
    <p>Whoops! It looks like this page has been moved or doesn't exist.</p>
    <a href="/" class="home-btn">Return to Portfolio</a>

    <script>
        // Match user's theme preference
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
